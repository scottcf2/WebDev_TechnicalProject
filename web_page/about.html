    <header>
        <h1>About This Project</h1>
    </header>

    <!--Main text body-->
    <main>
        <p id="aboutText" class="text-block"></p>
    </main>

    <section id="contact">
        <div class="grid-container">
            <div class="grid-x grid-margin-x">
                <div class="cell medium-6 medium-offset-3">
                    <h2 class="unique" style="text-align: left;">Contact</h2>
                    <p>Email: <a href="mailto:youremail@example.com">scottcforbes2@gmail.com</a></p>
                    <p>Phone: 999-999-9999</p>

                    <h3 style="text-align: left;">Contact Me (display purposes only)</h3>
                    <form>
                        <label for="name">
                            Name:
                            <input type="text" id="name" name="name" required>
                        </label>
                        <label for="email">
                            Email:
                            <input type="email" id="email" name="email" required>
                        </label>
                        <label for="subject">
                            Subject:
                            <select id="subject" name="subject" required>
                                <option value="general">General Inquiry</option>
                                <option value="job">Job Opportunity</option>
                                <option value="feedback">Feedback</option>
                                <option value="other">Other</option>
                            </select>
                        </label>
                        <label for="message">
                            Message:
                            <textarea id="message" name="message" rows="2" required></textarea>
                        </label>
                        <button type="submit" class="button expanded">Submit</button>
                    </form>
                </div>
            </div>
        </div>
    </section>

</body>
</html>
